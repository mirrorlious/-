name: Build JLPT egg rolls public pack

on:
  push:
    branches:
      - main
    paths:
      - tools/build_jlpt_eggrolls_pack.py
      - .github/workflows/build-jlpt-eggrolls-pack.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch pinned source notes
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/jlpt-source/deck-source"
          curl --fail --location --retry 3 \
            "https://raw.githubusercontent.com/5mdld/anki-jlpt-decks/2fe3632726ff63c429dbb602cf181c711247db53/deck-source/notes.csv" \
            --output "$RUNNER_TEMP/jlpt-source/deck-source/notes.csv"

      - name: Build public pack
        run: python tools/build_jlpt_eggrolls_pack.py "$RUNNER_TEMP/jlpt-source" .

      - name: Validate generated pack
        shell: bash
        run: |
          python - <<'PY'
          import base64, gzip, json, re
          from pathlib import Path
          root = Path('public-resources/jlpt-eggrolls')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          encoded = ''.join((root / name).read_text(encoding='utf-8') for name in manifest['files']['bundleParts'])
          bundle = json.loads(gzip.decompress(base64.b64decode(encoded)))
          decks = bundle['data']['decks']
          cards = bundle['cards']
          assert manifest['packId'] == 'jlpt-eggrolls-v35'
          assert manifest['cardCount'] == len(cards) == 10634
          assert manifest['deckCount'] == len(decks) == 11
          assert len({card['id'] for card in cards}) == len(cards)
          deck_ids = {deck['id'] for deck in decks}
          assert all(card['deckId'] in deck_ids for card in cards)
          assert all(str(card.get('front', '')).strip() and str(card.get('back', '')).strip() for card in cards)
          unsafe = re.compile(r'<script|javascript:|\son[a-z]+\s*=', re.I)
          assert not any(unsafe.search(' '.join(str(card.get(key, '')) for key in ('frontHtml', 'backHtml', 'cardCss'))) for card in cards)
          index = json.loads(Path('public-resources/manifest.json').read_text(encoding='utf-8'))
          item = next(pack for pack in index['packs'] if pack.get('packId') == 'jlpt-eggrolls-v35')
          assert item['cardCount'] == 10634 and item['deckCount'] == 11
          print(json.dumps({'cards': len(cards), 'decks': len(decks)}, ensure_ascii=False))
          PY
          git diff --check

      - name: Commit generated resources
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public-resources/manifest.json public-resources/jlpt-eggrolls
          git diff --cached --quiet || git commit -m "data: publish JLPT egg rolls card pack"
          git push origin HEAD:main
