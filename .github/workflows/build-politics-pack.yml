name: Build politics pack

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/build-politics-pack.py
      - .github/workflows/build-politics-pack.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch source notes
        run: |
          rm -rf /tmp/Politics-Obsidian-Note
          git clone --depth 1 --branch latest https://github.com/XColorful/Politics-Obsidian-Note.git /tmp/Politics-Obsidian-Note \
            || git clone --depth 1 https://github.com/XColorful/Politics-Obsidian-Note.git /tmp/Politics-Obsidian-Note
      - name: Build Miki asset pack
        run: python3 scripts/build-politics-pack.py /tmp/Politics-Obsidian-Note public-resources/politics-2027
      - name: Commit generated pack
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add public-resources
          git diff --cached --quiet && exit 0
          git commit -m "data: publish politics card pack"
          git push
