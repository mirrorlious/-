name: Build pharmacology public pack

on:
  push:
    branches:
      - codex/pharmacology-public-pack
    paths:
      - .github/workflows/build-pharmacology-pack.yml
      - tools/build_pharmacology_pack.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out resource branch
        uses: actions/checkout@v4
        with:
          ref: codex/pharmacology-public-pack
          fetch-depth: 0

      - name: Fetch licensed source project
        run: git clone --depth 1 https://github.com/nanguaguag/pharmacology.git "$RUNNER_TEMP/pharmacology-source"

      - name: Build Miki public pack
        run: python tools/build_pharmacology_pack.py "$RUNNER_TEMP/pharmacology-source" public-resources

      - name: Validate generated pack
        shell: bash
        run: |
          python - <<'PY'
          import base64, gzip, json, re
          from pathlib import Path
          root = Path('public-resources/pharmacology')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          encoded = ''.join(path.read_text(encoding='utf-8') for path in sorted(root.glob('pack.part-*.b64')))
          bundle = json.loads(gzip.decompress(base64.b64decode(encoded)))
          decks = bundle['data']['decks']
          cards = bundle['cards']
          assert manifest['packId'] == 'pharmacology-xmind-anki'
          assert manifest['cardCount'] == len(cards) == 257
          assert manifest['deckCount'] == len(decks) == 8
          assert len({card['id'] for card in cards}) == len(cards)
          deck_ids = {deck['id'] for deck in decks}
          assert all(card['deckId'] in deck_ids for card in cards)
          assert all(str(card.get('front', '')).strip() and str(card.get('back', '')).strip() for card in cards)
          unsafe = re.compile(r'<script|javascript:|\son[a-z]+\s*=', re.I)
          assert not any(unsafe.search(' '.join(str(card.get(key, '')) for key in ('frontHtml', 'backHtml', 'cardCss'))) for card in cards)
          assert manifest['conversion']['xmind']['convertedSheetCount'] == 55
          assert manifest['conversion']['anki']['convertedCardCount'] == 202
          print(json.dumps({'cards': len(cards), 'decks': len(decks)}, ensure_ascii=False))
          PY
          git diff --check

      - name: Commit generated resources
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public-resources/manifest.json public-resources/pharmacology
          git diff --cached --quiet || git commit -m "data: publish pharmacology XMind and Anki pack"
          git push origin HEAD:codex/pharmacology-public-pack
