<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>杨的外刊阅读器 - 真题联动版</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9fafb; color: #111827; }
    .loader { text-align: center; line-height: 1.8; }
    .dot { width: 36px; height: 36px; border-radius: 999px; border: 3px solid #d1d5db; border-top-color: #111827; animation: spin 0.9s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="dot"></div>
    <strong>正在加载杨的外刊阅读器</strong><br />
    <span>首次打开需要几秒钟。</span>
  </div>
  <script>
    async function loadApp() {
      const chunkPaths = [
        'app/index.html.gz.b64.0',
        'app/index.html.gz.b64.1',
        'app/index.html.gz.b64.2'
      ];
      const encoded = (await Promise.all(chunkPaths.map(async (path) => {
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error(`${path} 加载失败: ${response.status}`);
        return response.text();
      }))).join('').replace(/\s/g, '');

      const binary = Uint8Array.from(atob(encoded), (char) => char.charCodeAt(0));
      let html;
      if ('DecompressionStream' in window) {
        const stream = new Response(binary).body.pipeThrough(new DecompressionStream('gzip'));
        html = await new Response(stream).text();
      } else {
        throw new Error('当前浏览器不支持 gzip 解压，请使用新版 Chrome、Edge 或 Firefox。');
      }
      document.open();
      document.write(html);
      document.close();
    }

    loadApp().catch((error) => {
      document.body.innerHTML = `<main style="max-width:680px;padding:32px;font-family:system-ui,sans-serif;line-height:1.8"><h1>加载失败</h1><p>${error.message}</p><p>请刷新页面，或直接从仓库下载本地版本运行。</p></main>`;
      console.error(error);
    });
  </script>
</body>
</html>
